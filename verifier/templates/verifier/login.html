<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>HalluciCheck Login</title>
  <style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f0f0f;
        font-family: Arial, sans-serif;
        color: white;
    }

    .login-card {
        background: #1a1a1a;
        padding: 40px;
        border-radius: 12px;
        width: 360px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        text-align: center;
        border: 1px solid #2a2a2a;
    }

    h1 {
        margin-bottom: 10px;
        font-size: 26px;
        color: white;
    }

    p {
        margin-bottom: 25px;
        color: #aaa;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border-radius: 6px;
        border: 1px solid #333;
        background: #0f0f0f;
        color: white;
    }

    input:focus {
        outline: none;
        border-color: #888;
    }

    button {
        width: 100%;
        padding: 12px;
        background: white;
        color: black;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #ddd;
    }

    .error {
        color: #ff6b6b;
        margin-bottom: 10px;
    }
    </style>
</head>
<body>

<div class="login-card">
  <h1>HalluciCheck</h1>
  <p>Login to continue</p>

  {% if form.errors %}
    <div class="error">Invalid username or password</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    {{ form.username }}
    {{ form.password }}
    <button type="submit">Login</button>
  </form>
</div>

</body>
</html>
